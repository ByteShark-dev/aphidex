<!doctype html>
<html class="dark" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%PAGE_TITLE%</title>
    <meta name="description" content="%PAGE_DESCRIPTION%" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="author" content="%PAGE_AUTHOR%" />
    <meta name="theme-color" content="#071518" />
    <link rel="canonical" href="%PAGE_URL%" />
    <link rel="icon" type="image/webp" sizes="512x512" href="../assets/images/Aphidex_logo.webp" />

    <meta property="og:type" content="%OG_TYPE%" />
    <meta property="og:site_name" content="%SITE_NAME%" />
    <meta property="og:locale" content="%PAGE_LOCALE%" />
    <meta property="og:url" content="%PAGE_URL%" />
    <meta property="og:title" content="%PAGE_TITLE%" />
    <meta property="og:description" content="%PAGE_DESCRIPTION%" />
    <meta property="og:image" content="%PAGE_OG_IMAGE%" />
    <meta property="og:image:alt" content="%PAGE_TITLE%" />

    <meta name="twitter:card" content="%TWITTER_CARD%" />
    <meta name="twitter:title" content="%PAGE_TITLE%" />
    <meta name="twitter:description" content="%PAGE_DESCRIPTION%" />
    <meta name="twitter:image" content="%PAGE_OG_IMAGE%" />
    <meta name="twitter:image:alt" content="%PAGE_TITLE%" />

    <script id="structured-data" type="application/ld+json">
      %STRUCTURED_DATA%
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="selection:bg-primary-container selection:text-on-primary-container">
    <div id="app">%PAGE_CONTENT%</div>
    <script type="module" src="/src/privacy.js"></script>
  </body>
</html>
